<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racheal Chung | Portfolio</title>
    <link rel="icon" href="image_0.png" type="image/png">
    <style>
        /* 레퍼런스 스타일 시스템 */
        body { 
            background: #F1F1F1; 
            margin: 0; 
            padding: 60px; 
            font-family: "Helvetica Neue", sans-serif; 
            overflow-x: hidden;
        }

        /* 메인 타이틀 박스 */
        .main-header {
            border: 1px solid #000;
            display: inline-block;
            padding: 10px 40px;
            background: #fff;
            margin-bottom: 40px;
        }
        .main-header h1 { font-size: 45px; margin: 0; font-weight: 300; }

        /* 자기소개 텍스트 */
        #explain {
            font-size: 22px;
            line-height: 1.5;
            max-width: 900px;
            margin-bottom: 100px;
            font-weight: 300;
        }
        #explain strong { font-weight: 700; }

        /* 카드 그리드 */
        .options {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 50px;
        }

        .nav-card {
            flex: 1;
            height: 400px;
            background: #fff;
            border: 1px solid #000;
            position: relative;
            text-decoration: none !important;
            color: #000 !important;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 카드 왼쪽 상단 숫자 인덱스 */
        .card-index {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 35px;
            height: 35px;
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .card-title { font-size: 35px; font-weight: 400; }

        /* 호버 시 바운스 효과 */
        .nav-card:hover {
            transform: translateY(-20px);
            background: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .options { flex-direction: column; }
            .nav-card { height: 200px; }
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="main-header">
        <h1>Hi, I'm Racheal.</h1>
    </div>

    <div id="explain">
        Columbia University에서 <strong>Electrical Engineering</strong>과 <strong>AI</strong>를 전공하고 있습니다. <br>
        하드웨어 회로 설계부터 LLM 기반 시스템까지, 기술의 경계를 잇는 인터랙티브한 경험을 설계합니다. <br>
        <strong>아래 인덱스를 클릭해 저의 세계를 탐구해보세요!</strong>
    </div>

    <div class="options">
        <a href="about.html" class="nav-card">
            <div class="card-index">1</div>
            <div class="card-title">Background</div>
        </a>
        <a href="projects.html" class="nav-card">
            <div class="card-index">2</div>
            <div class="card-title">Projects</div>
        </a>
        <a href="coursework.html" class="nav-card">
            <div class="card-index">3</div>
            <div class="card-title">Coursework</div>
        </a>
    </div>

    <script>
        // 페이지 로드 시 순차적으로 튀어오르는 애니메이션
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.nav-card');
            cards.forEach((card, i) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(50px)';
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                    card.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                }, 150 * i);
            });
        });
    </script>
</body>
</html>
